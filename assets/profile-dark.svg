    .muted { font-size: 13px; fill: #8b949e; }
    .section { font-size: 14px; font-weight: 800; fill: #ff4d6d; letter-spacing: 1px; }
    .metric { font-size: 27px; font-weight: 800; }
    .label { font-size: 11px; font-weight: 700; fill: #8b949e; letter-spacing: 0.8px; }
    .tiny { font-size: 12px; fill: #8b949e; }
    .bread {font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif; font-size: 42px;}
